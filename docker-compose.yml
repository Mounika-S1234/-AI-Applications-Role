version: '3.8'

services:
  db:
    image: postgres:15
    container_name: crm_hcp_db
    environment:
      POSTGRES_DB: crm_hcp_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_hcp_backend
    depends_on:
      - db
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: postgresql://postgres:password@db:5432/crm_hcp_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - crm_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_hcp_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:8000/api
    ports:
      - "3000:80"
    networks:
      - crm_network

volumes:
  postgres_data:

networks:
  crm_network:
    driver: bridge
